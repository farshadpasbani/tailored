name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CHROME_BIN: /usr/bin/chromium-browser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install poppler and chromium
        run: sudo apt-get update && sudo apt-get install -y poppler-utils chromium-browser
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint:self
      - run: node dist/cli.js smoke
